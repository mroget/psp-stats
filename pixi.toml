[workspace]
authors = ["Mathieu R. <mathieu.roget@ens-lyon.org>"]
channels = ["conda-forge"]
name = "qpsp-correlation"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "pixi run maturin develop && pixi run python3 examples/basic.py"
bench = "pixi run maturin develop --release && pixi run python3 examples/basic.py"

[dependencies]
rust = ">=1.93.1,<1.94"
python = ">=3.10.20,<3.11"
numba = ">=0.64.0,<0.65"
numpy = ">=2.2.6,<3"
maturin = ">=1.12.6,<2"
pandas = ">=2.3.3,<3"
pip = ">=26.0.1,<27"
tqdm = ">=4.67.3,<5"
lua = ">=5.5.0,<6"
luajit = ">=2.1.1744318430,<3"

